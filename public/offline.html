<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#00a3a3" />
    <title>You're offline | Expensea</title>
    <style>
      :root {
        color-scheme: light dark;
        --background: #ffffff;
        --foreground: #102033;
        --muted: #5f6f7c;
        --border: #dfe6eb;
        --accent: #00a3a3;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: #0f1720;
          --foreground: #f2f5f7;
          --muted: #a7b2bb;
          --border: #263442;
          --accent: #1bd4d4;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        padding: calc(env(safe-area-inset-top) + 24px) 20px calc(env(safe-area-inset-bottom) + 24px);
        display: grid;
        place-items: center;
        background: var(--background);
        color: var(--foreground);
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        width: min(100%, 420px);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 24px;
        background: color-mix(in srgb, var(--background), var(--foreground) 3%);
      }

      .mark {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        background: var(--accent);
        color: #ffffff;
        font-weight: 700;
        letter-spacing: 0;
      }

      h1 {
        margin: 20px 0 8px;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      button {
        width: 100%;
        min-height: 40px;
        margin-top: 20px;
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: #ffffff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">EX</div>
      <h1>You're offline</h1>
      <p>Expensea needs a connection for private workspace data. Check your network and try again.</p>
      <button type="button" onclick="window.location.reload()">Retry</button>
    </main>
  </body>
</html>
